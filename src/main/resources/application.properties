server.port=${PORT:8081}
spring.application.name=demo

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lab_db}
spring.datasource.username=${DB_USER:user_admin}
spring.datasource.password=${DB_PASSWORD:password_123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Seguridad
jwt.secret=${JWT_SECRET:un_secreto_por_defecto_muy_largo_y_seguro}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Actuator para el endpoint /health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
